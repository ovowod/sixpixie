# .github/workflows/notify.yml
name: sixpixie · 퇴근 알림

on:
  schedule:
    - cron: '55 8 * * 1-5'  # 17:55 KST on weekdays (UTC+9 = UTC 08:55)
  workflow_dispatch:
    inputs:
      skip_holiday_check:
        description: 'Skip holiday check (for /sixpixie test)'
        required: false
        default: 'false'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r notify/requirements.txt

      - name: Run notifier
        working-directory: notify
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          SUBWAY_API_KEY: ${{ secrets.SUBWAY_API_KEY }}
          SKIP_HOLIDAY_CHECK: ${{ github.event.inputs.skip_holiday_check || 'false' }}
        run: python notify.py
